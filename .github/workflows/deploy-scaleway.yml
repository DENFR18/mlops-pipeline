name: Deploy to Scaleway

on:
  workflow_dispatch:

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_REGION: fr-par
  SCW_DEFAULT_ZONE: fr-par-1
  REGISTRY_NAMESPACE: mlops-pipeline
  CONTAINER_NAMESPACE: mlops-pipeline
  API_CONTAINER_NAME: mlops-api
  MLFLOW_CONTAINER_NAME: mlflow
  S3_ENDPOINT: https://s3.fr-par.scw.cloud

jobs:
  deploy:
    name: Build & deploy to Scaleway Serverless Containers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Scaleway CLI
        run: |
          set -euo pipefail
          SCW_VERSION="2.55.0"
          curl -fsSL "https://github.com/scaleway/scaleway-cli/releases/download/v${SCW_VERSION}/scaleway-cli_${SCW_VERSION}_linux_amd64" \
            -o /tmp/scw
          sudo install -m 0755 /tmp/scw /usr/local/bin/scw
          rm /tmp/scw
          scw version

      # ── Object Storage (MLflow artifacts) ──────────────────────────────────
      - name: Ensure MLflow artifact bucket exists
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: fr-par
        run: |
          set -euo pipefail
          BUCKET="mlops-pipeline-mlflow-${SCW_DEFAULT_PROJECT_ID:0:8}"
          if aws --endpoint-url "$S3_ENDPOINT" s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Bucket $BUCKET already exists."
          else
            aws --endpoint-url "$S3_ENDPOINT" s3 mb "s3://$BUCKET"
          fi
          echo "BUCKET=$BUCKET" >> "$GITHUB_ENV"

      # ── Registry ────────────────────────────────────────────────────────────
      - name: Ensure Container Registry namespace exists
        run: |
          set -euo pipefail
          NS_ID=$(scw registry namespace list name="$REGISTRY_NAMESPACE" -o json \
            | jq -r '.[0].id // empty')
          if [ -z "$NS_ID" ]; then
            echo "Creating registry namespace '$REGISTRY_NAMESPACE'..."
            scw registry namespace create name="$REGISTRY_NAMESPACE" is-public=false
            for i in $(seq 1 30); do
              STATUS=$(scw registry namespace list name="$REGISTRY_NAMESPACE" -o json \
                | jq -r '.[0].status')
              [ "$STATUS" = "ready" ] && break
              sleep 5
            done
          fi
          REGISTRY_ENDPOINT=$(scw registry namespace list name="$REGISTRY_NAMESPACE" -o json \
            | jq -r '.[0].endpoint')
          echo "REGISTRY_ENDPOINT=$REGISTRY_ENDPOINT" >> "$GITHUB_ENV"

      - name: Login to Scaleway Container Registry
        run: echo "$SCW_SECRET_KEY" | docker login "$REGISTRY_ENDPOINT" -u nologin --password-stdin

      # ── Serverless Containers namespace ────────────────────────────────────
      - name: Ensure Serverless Containers namespace exists
        run: |
          set -euo pipefail
          CN_ID=$(scw container namespace list name="$CONTAINER_NAMESPACE" -o json \
            | jq -r '.[0].id // empty')
          if [ -z "$CN_ID" ]; then
            CN_ID=$(scw container namespace create name="$CONTAINER_NAMESPACE" -o json \
              | jq -r '.id')
            for i in $(seq 1 30); do
              STATUS=$(scw container namespace get "$CN_ID" -o json | jq -r '.status')
              [ "$STATUS" = "ready" ] && break
              sleep 5
            done
          fi
          echo "CN_ID=$CN_ID" >> "$GITHUB_ENV"

      # ── MLflow: build, push, deploy FIRST so training can track to it ──────
      - name: Build & push MLflow image
        run: |
          set -euo pipefail
          MLFLOW_IMAGE="$REGISTRY_ENDPOINT/mlflow:${{ github.sha }}"
          docker build -t "$MLFLOW_IMAGE" mlflow/
          docker push "$MLFLOW_IMAGE"
          echo "MLFLOW_IMAGE=$MLFLOW_IMAGE" >> "$GITHUB_ENV"

      - name: Create or update MLflow container
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          MLFLOW_CT_ID=$(scw container container list namespace-id="$CN_ID" -o json \
            | jq -r --arg n "$MLFLOW_CONTAINER_NAME" '.[] | select(.name==$n) | .id' | head -n1)

          COMMON_ARGS=(
            registry-image="$MLFLOW_IMAGE"
            port=5000
            min-scale=0
            max-scale=1
            memory-limit=1024
            privacy=public
            protocol=http1
            environment-variables.MLFLOW_ARTIFACTS_DESTINATION="s3://$BUCKET/"
            environment-variables.MLFLOW_S3_ENDPOINT_URL="$S3_ENDPOINT"
            secret-environment-variables.0.key=MLFLOW_BACKEND_STORE_URI
            secret-environment-variables.0.value="$NEON_DATABASE_URL"
            secret-environment-variables.1.key=AWS_ACCESS_KEY_ID
            secret-environment-variables.1.value="$SCW_ACCESS_KEY"
            secret-environment-variables.2.key=AWS_SECRET_ACCESS_KEY
            secret-environment-variables.2.value="$SCW_SECRET_KEY"
          )

          if [ -z "$MLFLOW_CT_ID" ]; then
            MLFLOW_CT_ID=$(scw container container create \
              namespace-id="$CN_ID" \
              name="$MLFLOW_CONTAINER_NAME" \
              "${COMMON_ARGS[@]}" \
              -o json | jq -r '.id')
          else
            scw container container update "$MLFLOW_CT_ID" "${COMMON_ARGS[@]}"
          fi
          echo "MLFLOW_CT_ID=$MLFLOW_CT_ID" >> "$GITHUB_ENV"

      - name: Deploy MLflow & wait for ready
        run: |
          set -euo pipefail
          scw container container deploy "$MLFLOW_CT_ID"
          for i in $(seq 1 60); do
            STATUS=$(scw container container get "$MLFLOW_CT_ID" -o json | jq -r '.status')
            echo "mlflow status=$STATUS"
            [ "$STATUS" = "ready" ] && break
            [ "$STATUS" = "error" ] && { echo "MLflow deployment failed"; exit 1; }
            sleep 5
          done
          MLFLOW_URL=$(scw container container get "$MLFLOW_CT_ID" -o json | jq -r '.domain_name')
          echo "MLFLOW_URL=$MLFLOW_URL" >> "$GITHUB_ENV"

      # ── Model training (tracks to deployed MLflow) ─────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Train model
        run: |
          export MLFLOW_TRACKING_URI="https://$MLFLOW_URL"
          pip install -r requirements.txt
          python src/train.py

      # ── API: build, push, deploy ───────────────────────────────────────────
      - name: Build & push API image
        run: |
          set -euo pipefail
          IMAGE="$REGISTRY_ENDPOINT/mlops-pipeline:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Create or update API container
        run: |
          set -euo pipefail
          CT_ID=$(scw container container list namespace-id="$CN_ID" -o json \
            | jq -r --arg n "$API_CONTAINER_NAME" '.[] | select(.name==$n) | .id' | head -n1)
          if [ -z "$CT_ID" ]; then
            CT_ID=$(scw container container create \
              namespace-id="$CN_ID" \
              name="$API_CONTAINER_NAME" \
              registry-image="$IMAGE" \
              port=8000 \
              min-scale=0 \
              max-scale=1 \
              memory-limit=1024 \
              privacy=public \
              protocol=http1 \
              -o json | jq -r '.id')
          else
            scw container container update "$CT_ID" \
              registry-image="$IMAGE" \
              port=8000 \
              min-scale=0 \
              max-scale=1 \
              memory-limit=1024 \
              privacy=public
          fi
          echo "CT_ID=$CT_ID" >> "$GITHUB_ENV"

      - name: Deploy API & wait for ready
        run: |
          set -euo pipefail
          scw container container deploy "$CT_ID"
          for i in $(seq 1 60); do
            STATUS=$(scw container container get "$CT_ID" -o json | jq -r '.status')
            echo "api status=$STATUS"
            [ "$STATUS" = "ready" ] && break
            [ "$STATUS" = "error" ] && { echo "API deployment failed"; exit 1; }
            sleep 5
          done
          API_URL=$(scw container container get "$CT_ID" -o json | jq -r '.domain_name')
          echo ""
          echo "========================================"
          echo "  API:     https://$API_URL"
          echo "  Health:  https://$API_URL/health"
          echo "  MLflow:  https://$MLFLOW_URL"
          echo "========================================"
          echo ""
          {
            echo "### Scaleway deployment"
            echo ""
            echo "- API URL: https://$API_URL"
            echo "- API Health: https://$API_URL/health"
            echo "- MLflow UI: https://$MLFLOW_URL"
            echo "- Artifacts bucket: \`s3://$BUCKET/\`"
            echo "- API image: \`$IMAGE\`"
            echo "- MLflow image: \`$MLFLOW_IMAGE\`"
          } >> "$GITHUB_STEP_SUMMARY"
