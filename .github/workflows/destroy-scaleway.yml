name: Destroy Scaleway deployment

on:
  workflow_dispatch:
    inputs:
      delete_registry:
        description: "Also delete the Container Registry namespace (removes images)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      delete_bucket:
        description: "Also delete the MLflow artifact bucket (loses all experiments)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  SCW_ACCESS_KEY: ${{ secrets.SCW_ACCESS_KEY }}
  SCW_SECRET_KEY: ${{ secrets.SCW_SECRET_KEY }}
  SCW_DEFAULT_ORGANIZATION_ID: ${{ secrets.SCW_DEFAULT_ORGANIZATION_ID }}
  SCW_DEFAULT_PROJECT_ID: ${{ secrets.SCW_DEFAULT_PROJECT_ID }}
  SCW_DEFAULT_REGION: fr-par
  SCW_DEFAULT_ZONE: fr-par-1
  REGISTRY_NAMESPACE: mlops-pipeline
  CONTAINER_NAMESPACE: mlops-pipeline
  S3_ENDPOINT: https://s3.fr-par.scw.cloud

jobs:
  destroy:
    name: Tear down Scaleway resources
    runs-on: ubuntu-latest
    steps:
      - name: Install Scaleway CLI
        run: |
          set -euo pipefail
          SCW_VERSION="2.55.0"
          curl -fsSL "https://github.com/scaleway/scaleway-cli/releases/download/v${SCW_VERSION}/scaleway-cli_${SCW_VERSION}_linux_amd64" \
            -o /tmp/scw
          sudo install -m 0755 /tmp/scw /usr/local/bin/scw
          rm /tmp/scw
          scw version

      - name: Delete Serverless Containers namespace (cascades containers)
        run: |
          set -euo pipefail
          CN_ID=$(scw container namespace list name="$CONTAINER_NAMESPACE" -o json \
            | jq -r '.[0].id // empty')
          if [ -n "$CN_ID" ]; then
            echo "Deleting containers namespace $CN_ID..."
            scw container namespace delete "$CN_ID"
          else
            echo "No containers namespace '$CONTAINER_NAMESPACE' found."
          fi

      - name: Delete Container Registry namespace (optional)
        if: inputs.delete_registry == 'true'
        run: |
          set -euo pipefail
          NS_ID=$(scw registry namespace list name="$REGISTRY_NAMESPACE" -o json \
            | jq -r '.[0].id // empty')
          if [ -n "$NS_ID" ]; then
            echo "Deleting registry namespace $NS_ID..."
            scw registry namespace delete "$NS_ID"
          else
            echo "No registry namespace '$REGISTRY_NAMESPACE' found."
          fi

      - name: Delete MLflow artifact bucket (optional)
        if: inputs.delete_bucket == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCW_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCW_SECRET_KEY }}
          AWS_DEFAULT_REGION: fr-par
        run: |
          set -euo pipefail
          BUCKET="mlops-pipeline-mlflow-${SCW_DEFAULT_PROJECT_ID:0:8}"
          if aws --endpoint-url "$S3_ENDPOINT" s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            echo "Emptying and deleting bucket $BUCKET..."
            aws --endpoint-url "$S3_ENDPOINT" s3 rm "s3://$BUCKET" --recursive
            aws --endpoint-url "$S3_ENDPOINT" s3 rb "s3://$BUCKET"
          else
            echo "No bucket $BUCKET found."
          fi

      - name: Summary
        run: |
          {
            echo "### Scaleway teardown"
            echo ""
            echo "- Containers namespace: deleted (if it existed)"
            echo "- Registry namespace: ${{ inputs.delete_registry == 'true' && 'deleted' || 'kept' }}"
            echo "- MLflow bucket: ${{ inputs.delete_bucket == 'true' && 'deleted' || 'kept' }}"
          } >> "$GITHUB_STEP_SUMMARY"
