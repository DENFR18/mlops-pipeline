name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Least-privilege by default; jobs opt in to more scopes where needed.
permissions:
  contents: read

# Cancel duplicate runs on the same ref (e.g. new commit on an open PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Quality Gate ────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 src/ tests/ --max-line-length=100

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

  # ── Security: SAST & Code Quality ──────────────────────────────────────────
  # SonarCloud runs in "report" mode (sonar.qualitygate.wait=false).
  # The quality gate result shows up on the PR but does not block the pipeline
  # while we build confidence in the rule set. To skip gracefully on forks or
  # when SONAR_TOKEN is not configured, each step is guarded on token presence
  # rather than using continue-on-error (which would mask genuine failures).
  sonarcloud:
    name: "Security · SonarCloud"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check SONAR_TOKEN presence
        id: secret
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN not set, skipping SonarCloud analysis"
          fi
      - if: steps.secret.outputs.present == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for blame / new-code analysis
      - if: steps.secret.outputs.present == 'true'
        name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - if: steps.secret.outputs.present == 'true'
        name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── Security: IaC Misconfiguration Scan ────────────────────────────────────
  # Checkov runs in soft-fail mode: findings surface in the GitHub Security tab
  # via SARIF but do not block merges yet. Next step is to triage the baseline,
  # pin exceptions in a .checkov.yaml skip-list, then flip soft_fail to false.
  checkov:
    name: "Security · Checkov (IaC)"
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      security-events: write  # required to upload SARIF
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov (Dockerfile, Terraform)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,terraform
          soft_fail: true
          output_format: sarif
          output_file_path: checkov-results.sarif
      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Train model
        run: |
          pip install -r requirements.txt
          python src/train.py
      - name: Build Docker image
        run: docker build -t mlops-pipeline:${{ github.sha }} .
      - name: Test container health
        run: |
          docker run -d -p 8000:8000 --name api mlops-pipeline:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health
          docker stop api
      - name: Export Docker image as tarball
        run: docker save mlops-pipeline:${{ github.sha }} -o image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ── Security: Container Vulnerability Scan ─────────────────────────────────
  # Trivy runs in report mode (exit-code 0) until the base-image CVE baseline
  # is triaged. All CRITICAL/HIGH findings with a fix available are uploaded
  # to the GitHub Security tab via SARIF, so regressions are still visible.
  # Target production policy: exit-code 1 + .trivyignore for accepted risk.
  trivy:
    name: "Security · Trivy (Docker)"
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write  # required to upload SARIF
    steps:
      - uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: docker load -i image.tar
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mlops-pipeline:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ── Push to Registry (gated on all security checks) ────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [trivy, sonarcloud, checkov]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load Docker image
        run: docker load -i image.tar
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag & push to GHCR
        run: |
          docker tag mlops-pipeline:${{ github.sha }} ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag mlops-pipeline:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
